name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      # The markdown-only page registry is generated from the files. It must be
      # committed up to date - regenerate and fail if anything changed.
      - name: Registry is in sync
        run: |
          node scripts/generate-compendium-registry.mjs
          git diff --exit-code -- src/data/compendiumRegistry.generated.js \
            || (echo "::error::compendiumRegistry.generated.js is stale - run 'npm run registry' and commit." && exit 1)

      # Structural audit: orphans, broken regs/images/links, invalid adventure YAML.
      - name: Compendium audit
        run: npm run audit

      - name: Build
        run: npm run build
