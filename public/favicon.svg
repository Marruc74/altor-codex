<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="The Altor Codex">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1510"/>
      <stop offset="1" stop-color="#0a0807"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8d5a3"/>
      <stop offset=".5" stop-color="#c8a951"/>
      <stop offset="1" stop-color="#9e7c38"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a33030"/>
      <stop offset="1" stop-color="#6f1818"/>
    </linearGradient>
  </defs>

  <!-- warm-dark tile with gold edge + inner keyline (the site's framed panels) -->
  <rect x="3" y="3" width="58" height="58" rx="13" fill="url(#panel)" stroke="#9e7c38" stroke-width="2.5"/>
  <rect x="8" y="8" width="48" height="48" rx="8" fill="none" stroke="#3a2a1a" stroke-width="1.25"/>

  <g stroke-linejoin="round">
    <!-- ornamental gold lozenge (the ◈ sigil) -->
    <path d="M32 9 55 32 32 55 9 32Z" fill="url(#gold)" stroke="#8a6a2e" stroke-width="1"/>
    <!-- carve the frame -->
    <path d="M32 18 46 32 32 46 18 32Z" fill="url(#panel)"/>
    <!-- crimson gem core with a light-gold facet edge -->
    <path d="M32 24.5 39.5 32 32 39.5 24.5 32Z" fill="url(#gem)" stroke="#e8d5a3" stroke-width="1"/>
  </g>

  <!-- four small gold studs at the cardinal points -->
  <g fill="#c8a951">
    <circle cx="32" cy="6" r="1.6"/>
    <circle cx="58" cy="32" r="1.6"/>
    <circle cx="32" cy="58" r="1.6"/>
    <circle cx="6" cy="32" r="1.6"/>
  </g>
</svg>
